baseURL = "https://obrienalaribe.github.io/journal/"
languageCode = "en"
defaultContentLanguage = "en"
title = "ob's journal"
theme = "hugo-coder"

paginate = 50
enableEmoji = true

[permalinks]
  posts = "/:slug/"

[params]
  author = "OB"
  description = "building, learning and sharing my thoughts"
  keywords = "agents, harness, claude-code, dev-tooling, llm"
  info = ["building, learning and sharing my thoughts"]
  dateFormat = "January 2, 2006"
  since = 2026
  enableTwemoji = true
  colorScheme = "auto"
  hidecolorschemetoggle = false

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[[params.social]]
  name = "Github"
  icon = "fa fa-2x fa-github"
  weight = 1
  url = "https://github.com/obrienalaribe/"

[[languages.en.menu.main]]
  name = "Posts"
  weight = 1
  url = "posts/"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "monokai"
  noClasses = false
