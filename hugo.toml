baseURL = "https://obrienalaribe.github.io/journal/"
languageCode = "en"
defaultContentLanguage = "en"
title = "ob's journal"
theme = "hugo-coder"

paginate = 20
enableEmoji = true

# Posts at /journal/<slug>/ instead of /journal/posts/<slug>/
[permalinks]
  posts = "/:slug/"

[params]
  author = "OB"
  description = "Notes on agent harnesses, dev tooling, and shipping POCs without burning engineering time."
  keywords = "agents, harness, claude-code, dev-tooling, llm"
  info = ["Engineer", "Working on agent harnesses + dev tooling"]
  dateFormat = "January 2, 2006"
  since = 2026
  enableTwemoji = true
  colorScheme = "auto"
  hidecolorschemetoggle = false

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[[params.social]]
  name = "Github"
  icon = "fa fa-2x fa-github"
  weight = 1
  url = "https://github.com/obrienalaribe/"

[[languages.en.menu.main]]
  name = "Posts"
  weight = 1
  url = "/"

[[languages.en.menu.main]]
  name = "About"
  weight = 2
  url = "about/"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "monokai"
  noClasses = false
